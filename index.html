<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Natasha</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; user-select: none; }

    #bg { width: 100%; height: 100%; object-fit: cover; display: block; position: fixed; top: 0; left: 0; }

    /* ── CD Player Window ── */
    #cdplayer {
      position: absolute;
      top: 75px;
      left: calc(50% + 10px);
      width: 490px;
      font-family: 'Tahoma', 'Arial', sans-serif;
      font-size: 11px;
      box-shadow: 3px 3px 12px rgba(0,0,0,0.6);
      z-index: 10;
    }

    /* Title bar */
    #cd-titlebar {
      background: linear-gradient(to right,
        #0c2ec4 0%, #1a55d8 25%, #2e7ae0 55%, #4496e8 80%, #5aaef0 100%);
      padding: 3px 5px 4px 6px;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: move;
      border-top: 1px solid #a0c4ff;
      border-left: 1px solid #a0c4ff;
      border-right: 1px solid #0a1880;
      height: 28px;
    }

    #cd-titlebar .title-icon { font-size: 15px; line-height: 1; }

    #cd-titlebar .title-text {
      color: #fff;
      font-weight: bold;
      font-size: 12px;
      flex: 1;
      text-shadow: 1px 1px 1px rgba(0,0,50,0.6);
      letter-spacing: 0.2px;
    }

    .win-btns { display: flex; gap: 2px; }

    .win-btn {
      width: 21px;
      height: 20px;
      background: linear-gradient(to bottom, #dce8fc 0%, #a8c0e8 100%);
      border-top: 1px solid #e8f0ff;
      border-left: 1px solid #e8f0ff;
      border-right: 1px solid #3060a0;
      border-bottom: 1px solid #3060a0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: bold;
      color: #000;
    }
    .win-btn:hover { background: linear-gradient(to bottom, #eef2ff 0%, #c0d4f8 100%); }
    .win-btn.close:hover {
      background: linear-gradient(to bottom, #f04040 0%, #b81818 100%);
      color: #fff;
      border-color: #801010;
    }

    /* Window body */
    #cd-body {
      background: #d4d0c8;
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      border-top: none;
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    /* Album art */
    #cd-art {
      width: 132px;
      height: 132px;
      flex-shrink: 0;
      background: #0d0d20;
      border: 2px solid;
      border-color: #808080 #ffffff #ffffff #808080;
      overflow: hidden;
      position: relative;
    }

    #cd-art svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Info panel */
    #cd-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-top: 2px;
    }

    .cd-row { display: flex; align-items: stretch; gap: 3px; }

    .cd-label {
      width: 38px;
      text-align: right;
      font-size: 11px;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .cd-field-wrap {
      flex: 1;
      display: flex;
      border: 2px solid;
      border-color: #808080 #ffffff #ffffff #808080;
      background: #fff;
      overflow: hidden;
    }

    .cd-field-text {
      flex: 1;
      padding: 2px 5px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 13px;
      color: #000;
      display: flex;
      align-items: center;
    }

    .cd-drive {
      padding: 2px 5px;
      font-size: 10px;
      color: #555;
      border-left: 1px solid #ccc;
      background: #eae6de;
      display: flex;
      align-items: center;
      white-space: nowrap;
      font-family: 'Tahoma', sans-serif;
    }

    .cd-dropdown {
      width: 16px;
      background: linear-gradient(to bottom, #e8e4dc 0%, #c4c0b8 100%);
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7px;
      cursor: pointer;
      flex-shrink: 0;
      color: #000;
    }

    /* Progress slider */
    #cd-progress-wrap { padding: 2px 0 0; }

    #progress {
      width: 100%;
      height: 22px;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
      display: block;
    }

    #progress::-webkit-slider-runnable-track {
      height: 3px;
      background: #888;
      border-top: 1px solid #444;
      border-bottom: 1px solid #ccc;
      margin-top: 9px;
    }

    #progress::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px;
      height: 22px;
      margin-top: -9px;
      background: linear-gradient(to bottom, #ece8e0 0%, #c4c0b8 100%);
      border-top: 1px solid #fff;
      border-left: 1px solid #fff;
      border-right: 1px solid #808080;
      border-bottom: 1px solid #808080;
    }

    /* Transport buttons */
    #cd-transport {
      display: flex;
      gap: 3px;
      margin-top: 8px;
    }

    .t-btn {
      flex: 1;
      height: 27px;
      background: linear-gradient(to bottom, #ece8e0 0%, #c4c0b8 100%);
      border-top: 1px solid #fff;
      border-left: 1px solid #fff;
      border-right: 1px solid #808080;
      border-bottom: 1px solid #808080;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #000;
    }

    .t-btn:hover { background: linear-gradient(to bottom, #f8f4ec 0%, #d8d4cc 100%); }
    .t-btn.no-click { pointer-events: none; opacity: 0.6; cursor: default; }

    .t-btn:active,
    .t-btn.pressed {
      border-color: #808080 #fff #fff #808080;
      background: linear-gradient(to bottom, #c4c0b8 0%, #ece8e0 100%);
    }

    /* ── MS Paint ── */
    #mspaint {
      position: absolute;
      top: 50px;
      left: 200px;
      width: 360px;
      font-family: 'Tahoma', 'Arial', sans-serif;
      font-size: 11px;
      box-shadow: 3px 3px 12px rgba(0,0,0,0.6);
      z-index: 10;
    }

    #paint-titlebar {
      background: linear-gradient(to right,
        #0c2ec4 0%, #1a55d8 25%, #2e7ae0 55%, #4496e8 80%, #5aaef0 100%);
      padding: 3px 5px 4px 6px;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: move;
      border-top: 1px solid #a0c4ff;
      border-left: 1px solid #a0c4ff;
      border-right: 1px solid #0a1880;
      height: 28px;
    }

    #paint-titlebar .paint-icon { font-size: 14px; }
    #paint-titlebar .paint-title {
      color: #fff; font-weight: bold; font-size: 12px; flex: 1;
      text-shadow: 1px 1px 1px rgba(0,0,50,0.6);
    }

    #paint-body {
      background: #d4d0c8;
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      border-top: none;
      display: flex;
      flex-direction: column;
    }

    #paint-menubar {
      display: flex;
      padding: 2px 4px;
      border-bottom: 1px solid #a0a0a0;
    }

    .paint-menu {
      padding: 2px 8px;
      font-size: 11px;
      color: #000;
      cursor: pointer;
    }
    .paint-menu:hover { background: #0a246a; color: #fff; }

    #paint-workspace {
      display: flex;
      flex-direction: row;
    }

    /* Left toolbar */
    #paint-tools {
      width: 54px;
      background: #d4d0c8;
      border-right: 1px solid #a0a0a0;
      padding: 2px;
      display: flex;
      flex-direction: column;
      gap: 0;
      flex-shrink: 0;
    }

    #paint-tool-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
    }

    .pt {
      width: 24px;
      height: 24px;
      background: linear-gradient(to bottom, #e8e4dc 0%, #c4c0b8 100%);
      border: 1px solid;
      border-color: #fff #808080 #808080 #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      cursor: pointer;
      user-select: none;
    }

    .pt:hover, .pt.active {
      border-color: #808080 #fff #fff #808080;
      background: linear-gradient(to bottom, #c4c0b8 0%, #e8e4dc 100%);
    }

    #paint-color-preview {
      margin: 6px 2px 2px;
      position: relative;
      height: 34px;
    }

    #paint-bg-color {
      position: absolute;
      bottom: 0; left: 12px;
      width: 22px; height: 22px;
      border: 1px solid #000;
      background: #fff;
    }

    #paint-fg-color {
      position: absolute;
      top: 0; left: 0;
      width: 22px; height: 22px;
      border: 1px solid #000;
      background: #000;
      z-index: 1;
    }

    /* Canvas area */
    #paint-canvas-wrap {
      flex: 1;
      background: #808080;
      overflow: auto;
      padding: 6px;
    }

    #paint-canvas {
      display: block;
      cursor: crosshair;
      background: #fff;
    }

    /* Color bar */
    #paint-colorbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 4px;
      border-top: 1px solid #a0a0a0;
      background: #d4d0c8;
    }

    #paint-palette {
      display: grid;
      grid-template-columns: repeat(14, 16px);
      grid-template-rows: repeat(2, 16px);
      gap: 1px;
    }

    .pc {
      width: 16px;
      height: 16px;
      border: 1px solid #808080;
      cursor: pointer;
      flex-shrink: 0;
    }
    .pc:hover { border-color: #000; transform: scale(1.15); }

    #paint-statusbar {
      font-size: 10px;
      padding: 2px 6px;
      border-top: 1px solid #a0a0a0;
      color: #000;
      background: #d4d0c8;
    }

    /* ── Notepad ── */
    #notepad {
      position: absolute;
      top: 310px;
      left: calc(37% - 60px);
      width: 480px;
      font-family: 'Tahoma', 'Arial', sans-serif;
      font-size: 11px;
      box-shadow: 3px 3px 12px rgba(0,0,0,0.6);
      z-index: 10;
    }

    #np-titlebar {
      background: linear-gradient(to right,
        #0c2ec4 0%, #1a55d8 25%, #2e7ae0 55%, #4496e8 80%, #5aaef0 100%);
      padding: 3px 5px 4px 6px;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: move;
      border-top: 1px solid #a0c4ff;
      border-left: 1px solid #a0c4ff;
      border-right: 1px solid #0a1880;
      height: 28px;
    }

    #np-titlebar .np-icon { font-size: 14px; line-height: 1; }

    #np-titlebar .np-title {
      color: #fff;
      font-weight: bold;
      font-size: 12px;
      flex: 1;
      text-shadow: 1px 1px 1px rgba(0,0,50,0.6);
    }

    #np-body {
      background: #d4d0c8;
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      border-top: none;
      display: flex;
      flex-direction: column;
    }

    #np-menubar {
      display: flex;
      gap: 0;
      padding: 2px 4px;
      border-bottom: 1px solid #a0a0a0;
      background: #d4d0c8;
    }

    .np-menu {
      padding: 2px 6px;
      font-size: 11px;
      color: #000;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .np-menu:hover {
      background: #0a246a;
      color: #fff;
      border-color: #0a246a;
    }

    #np-content {
      position: relative;
      background: #fff;
      border: 2px solid;
      border-color: #808080 #ffffff #ffffff #808080;
      margin: 4px;
    }

    #np-textarea {
      width: 100%;
      height: 320px;
      border: none;
      outline: none;
      resize: none;
      padding: 4px;
      font-family: 'Lucida Console', 'Courier New', monospace;
      font-size: 14px;
      color: #000;
      background: #fff;
      display: block;
    }

    /* ── Desktop Icons ── */
    .desk-icon {
      position: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: grab;
      text-decoration: none;

    .desk-icon img {
      width: 110px;

    .desk-icon span {

      text-shadow: 1px 1px 2px #000, -1px -1px 2px #000, 1px -1px 2px #000, -1px 1px 2px #000;
      line-height: 1.3;
    }
  </style>
</head>

  <script>
    /* ── Drag ── */
    const player   = document.getElementById('cdplayer');
    const titlebar = document.getElementById('cd-titlebar');
    let dragging = false, ox = 0, oy = 0;

    titlebar.addEventListener('mousedown', e => {
      if (e.target.classList.contains('win-btn')) return;
      dragging = true;
      ox = e.clientX - player.getBoundingClientRect().left;
      oy = e.clientY - player.getBoundingClientRect().top;
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      player.style.left  = (e.clientX - ox) + 'px';
      player.style.top   = (e.clientY - oy) + 'px';
      player.style.right = 'auto';
    });
    document.addEventListener('mouseup', () => dragging = false);

    /* ── Audio ── */
    const audio    = document.getElementById('audio');
    const progress = document.getElementById('progress');
    const playBtn  = document.getElementById('btn-play');
    let playing = false;

    playBtn.addEventListener('click', () => {
      if (playing) {
        audio.pause();
        playBtn.innerHTML = '&#9654;';
        playBtn.classList.remove('pressed');
        playing = false;
      } else {
        audio.play().catch(() => {});
        playBtn.innerHTML = '&#9646;&#9646;';
        playBtn.classList.add('pressed');
        playing = true;
      }
    });

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) progress.value = (audio.currentTime / audio.duration) * 100;
    });

    progress.addEventListener('input', () => {
      if (audio.duration) audio.currentTime = (progress.value / 100) * audio.duration;
    });

    audio.addEventListener('ended', () => {
      playBtn.innerHTML = '&#9654;';
      playBtn.classList.remove('pressed');
      playing = false;
      progress.value = 0;
    });

    /* ── MS Paint ── */
    const paintEl    = document.getElementById('mspaint');
    const paintBar   = document.getElementById('paint-titlebar');
    const paintCanvas = document.getElementById('paint-canvas');
    const ctx        = paintCanvas.getContext('2d');
    let paintDrag = false, pdOx = 0, pdOy = 0;

    // Load avatar image as base layer
    const avatarImg = new Image();
    avatarImg.src = 'avatar.png';
    avatarImg.onload = () => {
      ctx.drawImage(avatarImg, 0, 0, paintCanvas.width, paintCanvas.height);
    };

    // Titlebar drag
    paintBar.addEventListener('mousedown', e => {
      if (e.target.classList.contains('win-btn')) return;
      paintDrag = true;
      pdOx = e.clientX - paintEl.getBoundingClientRect().left;
      pdOy = e.clientY - paintEl.getBoundingClientRect().top;
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!paintDrag) return;
      paintEl.style.left = (e.clientX - pdOx) + 'px';
      paintEl.style.top  = (e.clientY - pdOy) + 'px';
    });
    document.addEventListener('mouseup', () => { paintDrag = false; });

    // Window buttons
    document.querySelector('.paint-close').addEventListener('click', () => paintEl.style.display = 'none');
    document.querySelector('.paint-min').addEventListener('click', () => {
      const b = document.getElementById('paint-body');
      b.style.display = b.style.display === 'none' ? 'flex' : 'none';
    });

    // Color palette
    const colors = [
      '#000000','#808080','#800000','#808000','#008000','#008080','#000080','#800080','#808040','#004040','#0080FF','#004080','#8000FF','#804000',
      '#FFFFFF','#C0C0C0','#FF0000','#FFFF00','#00FF00','#00FFFF','#0000FF','#FF00FF','#FFFF80','#00FF80','#80FFFF','#8080FF','#FF0080','#FF8040'
    ];
    const palette = document.getElementById('paint-palette');
    let drawColor = '#000000';

    colors.forEach(c => {
      const swatch = document.createElement('div');
      swatch.className = 'pc';
      swatch.style.background = c;
      swatch.addEventListener('click', () => {
        drawColor = c;
        document.getElementById('paint-fg-color').style.background = c;
      });
      palette.appendChild(swatch);
    });

    // Tool selection
    let activeTool = 'pencil';
    document.querySelectorAll('.pt').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.pt').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTool = btn.dataset.tool;
        paintCanvas.style.cursor = activeTool === 'eraser' ? 'cell' : 'crosshair';
      });
    });

    // Undo stack
    const undoStack = [];
    function saveSnapshot() {
      undoStack.push(ctx.getImageData(0, 0, paintCanvas.width, paintCanvas.height));
      if (undoStack.length > 30) undoStack.shift();
    }

    document.getElementById('paint-undo').addEventListener('click', () => {
      if (undoStack.length === 0) return;
      ctx.putImageData(undoStack.pop(), 0, 0);
    });

    // Drawing
    let painting = false, lastX = 0, lastY = 0;

    paintCanvas.addEventListener('mousedown', e => {
      saveSnapshot();
      painting = true;
      const r = paintCanvas.getBoundingClientRect();
      lastX = e.clientX - r.left;
      lastY = e.clientY - r.top;
      if (activeTool === 'fill') {
        ctx.fillStyle = drawColor;
        ctx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);
      }
    });

    paintCanvas.addEventListener('mousemove', e => {
      if (!painting) return;
      const r = paintCanvas.getBoundingClientRect();
      const x = e.clientX - r.left;
      const y = e.clientY - r.top;
      ctx.beginPath();
      if (activeTool === 'eraser') {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 12;
      } else {
        ctx.strokeStyle = drawColor;
        ctx.lineWidth = 2;
      }
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(x, y);
      ctx.stroke();
      lastX = x;
      lastY = y;
    });

    paintCanvas.addEventListener('mouseup',   () => { painting = false; });
    paintCanvas.addEventListener('mouseleave', () => { painting = false; });

    /* ── Notepad drag ── */
    const notepad   = document.getElementById('notepad');
    const npTitlebar = document.getElementById('np-titlebar');
    let npDragging = false, npOx = 0, npOy = 0;

    npTitlebar.addEventListener('mousedown', e => {
      if (e.target.classList.contains('win-btn')) return;
      npDragging = true;
      npOx = e.clientX - notepad.getBoundingClientRect().left;
      npOy = e.clientY - notepad.getBoundingClientRect().top;
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!npDragging) return;
      notepad.style.left  = (e.clientX - npOx) + 'px';
      notepad.style.top   = (e.clientY - npOy) + 'px';
    });
    document.addEventListener('mouseup', () => { npDragging = false; });

    document.querySelector('.np-close').addEventListener('click', () => {
      notepad.style.display = 'none';
    });
    document.querySelector('.np-min').addEventListener('click', () => {
      const body = document.getElementById('np-body');
      body.style.display = body.style.display === 'none' ? 'flex' : 'none';
    });

    /* ── Draggable Icons ── */
    let dragIcon = null, ix = 0, iy = 0;

    document.querySelectorAll('.desk-icon').forEach(icon => {
      icon.addEventListener('mousedown', e => {
        e.preventDefault();
        dragIcon = icon;
        const r = icon.getBoundingClientRect();
        // Lock to left/top so dragging works correctly
        icon.style.left   = r.left + 'px';
        icon.style.top    = r.top  + 'px';
        icon.style.right  = 'auto';
        icon.style.bottom = 'auto';
        ix = e.clientX - r.left;
        iy = e.clientY - r.top;
        icon.style.zIndex = 20;
      });
    });

    document.addEventListener('mousemove', e => {
      if (!dragIcon) return;
      dragIcon.style.left = (e.clientX - ix) + 'px';
      dragIcon.style.top  = (e.clientY - iy) + 'px';
    });

    document.addEventListener('mouseup', () => { dragIcon = null; });

    // Block single click, open on double click
    document.querySelectorAll('.desk-icon').forEach(icon => {
      icon.addEventListener('click', e => e.preventDefault());
      icon.addEventListener('dblclick', e => {
        e.preventDefault();
        const url = icon.dataset.url;
        if (url) window.open(url, '_blank', 'noopener,noreferrer');
      });
    });

    /* ── Window buttons ── */
    document.querySelector('.win-btn.close').addEventListener('click', () => {
      player.style.display = 'none';
      audio.pause();
      playing = false;
    });

    document.querySelector('.win-btn.min').addEventListener('click', () => {
      const body = document.getElementById('cd-body');
      body.style.display = body.style.display === 'none' ? 'flex' : 'none';
    });
  </script>
</body>
</html>
